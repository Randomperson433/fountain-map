<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grid Tool — Find Fountain Coordinates</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --white: #ffffff;
  --border: #e0ddd6;
  --border2: #ccc9c0;
  --text: #1c1b18;
  --text2: #5c5a53;
  --text3: #9e9c94;
  --accent: #2563eb;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

header {
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: var(--white); flex-shrink: 0;
}
.h-title { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }
.h-hint { font-family: var(--mono); font-size: 10px; color: var(--text3); }

.main { display: flex; height: calc(100vh - 48px); overflow: hidden; }

/* Map area */
.map-wrap {
  flex: 1; position: relative; overflow: hidden; cursor: crosshair;
  background: var(--white);
}

/* The floor plan SVG is panned/zoomed via viewBox, same approach as map.html */
#floor-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}
#grid-svg  { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

/* Crosshairs */
#xhair-h, #xhair-v {
  position: absolute; background: rgba(37,99,235,0.3);
  pointer-events: none; z-index: 5; display: none;
}
#xhair-h { left: 0; right: 0; height: 1px; }
#xhair-v { top: 0; bottom: 0; width: 1px; }
#cursor-dot {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); border: 2px solid white;
  transform: translate(-50%,-50%); pointer-events: none;
  display: none; z-index: 10; box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
}

/* Zoom controls */
.zoom-btns { position: absolute; bottom: 14px; left: 14px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
.zoom-btn { width: 30px; height: 30px; background: var(--white); border: 1px solid var(--border2); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; line-height: 1; transition: background 0.12s; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.zoom-btn:hover { background: var(--bg); }
.zoom-btn.reset { font-family: var(--mono); font-size: 11px; }
.zoom-hint { position: absolute; bottom: 14px; right: 14px; font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 4px 9px; z-index: 10; pointer-events: none; }

/* Side panel */
.panel {
  width: 240px; border-left: 1px solid var(--border);
  background: var(--white); display: flex; flex-direction: column;
  overflow-y: auto; flex-shrink: 0;
}
.ps {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.ps-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.12em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 11px;
}

/* Live coord display */
.coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0; }
.coord-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 9px 10px;
}
.ck { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.cv { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--accent); }

/* Clicked coord */
.click-box {
  background: #eff6ff; border: 1px solid #bfdbfe;
  border-radius: 5px; padding: 11px 12px; font-size: 12px;
  font-family: var(--mono); color: var(--text2); line-height: 1.6;
  margin-bottom: 0;
}
.click-val { display: block; font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
.click-hint { font-size: 10px; color: var(--text3); }

.copy-btn {
  width: 100%; margin-top: 8px;
  background: none; border: 1px solid var(--border2);
  color: var(--text2); font-family: var(--mono);
  font-size: 11px; padding: 7px; border-radius: 4px;
  cursor: pointer; letter-spacing: 0.05em;
  transition: border-color 0.15s, color 0.15s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: #16a34a; color: #16a34a; }

/* Grid controls */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--mono); font-size: 11px; color: var(--text2); margin-bottom: 10px;
}
.toggle {
  width: 32px; height: 18px;
  background: var(--border2); border-radius: 9px;
  position: relative; cursor: pointer; border: none;
  transition: background 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute;
  width: 12px; height: 12px; border-radius: 50%;
  background: white; top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(14px); }
.density-row {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--text2);
}
.density-row input { flex: 1; accent-color: var(--accent); }
.dv { color: var(--accent); min-width: 24px; font-family: var(--mono); font-size: 11px; }

/* History */
.hist-list { display: flex; flex-direction: column; gap: 5px; }
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 9px; font-size: 11px;
  font-family: var(--mono);
}
.hist-xy { color: var(--text2); }
.hist-xy span { color: var(--accent); }
.hist-n { color: var(--text3); font-size: 10px; }
.hist-cp {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 12px; padding: 0 2px;
  font-family: var(--mono);
}
.hist-cp:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="h-title">Coordinate grid tool</span>
    <span style="font-family:var(--mono);font-size:10px;letter-spacing:0.08em;background:var(--text);color:white;padding:3px 9px;border-radius:3px;">Level 1</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <a href="grid2.html" style="font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:none;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);">Level 2 →</a>
  </div>
  <span class="h-hint">hover to preview · click to lock coordinate · paste into FOUNTAINS array in map.html</span>
</header>

<div class="main">
  <div class="map-wrap" id="map-wrap">
    <svg id="floor-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg id="grid-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="xhair-h"></div>
    <div id="xhair-v"></div>
    <div id="cursor-dot"></div>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoomBy(1.3)">+</button>
      <button class="zoom-btn" onclick="zoomBy(0.77)">−</button>
      <button class="zoom-btn reset" onclick="resetView()">fit</button>
    </div>
    <div class="zoom-hint">scroll to zoom · drag to pan</div>
  </div>

  <div class="panel">
    <div class="ps">
      <div class="ps-label">Live position</div>
      <div class="coord-grid">
        <div class="coord-box"><div class="ck">X %</div><div class="cv" id="lx">—</div></div>
        <div class="coord-box"><div class="ck">Y %</div><div class="cv" id="ly">—</div></div>
      </div>
    </div>

    <div class="ps">
      <div class="ps-label">Last click</div>
      <div class="click-box" id="click-box">
        <span class="click-val">—</span>
        <span class="click-hint">click the map to lock a point</span>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyCoords()">copy as x: N, y: N</button>
    </div>

    <div class="ps">
      <div class="ps-label">Grid</div>
      <div class="toggle-row">
        Show grid
        <button class="toggle on" id="grid-toggle" onclick="toggleGrid()"></button>
      </div>
      <div class="density-row">
        Density
        <input type="range" id="density" min="5" max="20" value="10" step="5" oninput="updateGrid()"/>
        <span class="dv" id="dv">10</span>
      </div>
    </div>

    <div class="ps" style="flex:1; border-bottom:none;">
      <div class="ps-label">Click history</div>
      <div class="hist-list" id="history"></div>
    </div>
  </div>
</div>

<script>
// ── Floor plan dimensions ─────────────────────
var SVG_X = 460;   // viewBox origin x
var SVG_Y = 220;   // viewBox origin y
var NAT_W = 460 + 1840;  // = 2300  (full x extent)
var NAT_H = 220 + 1640;  // = 1860  (full y extent)
var FLOOR_SRC = '../img/floorplan1.svg';

// ── Pan/zoom state (same viewBox approach as map.html) ────────────────
var vx = 0, vy = 0, vw = NAT_W, vh = NAT_H;
var isDragging = false;
var dragStartX = 0, dragStartY = 0, dragStartVx = 0, dragStartVy = 0;
var isHovering = false;

function screenToSVG(px, py) {
  var c = document.getElementById('map-wrap');
  return {
    x: vx + (px / c.clientWidth)  * vw,
    y: vy + (py / c.clientHeight) * vh
  };
}

// Convert SVG coords back to percentage of full image
function svgToPct(sx, sy) {
  // map.html's svgNatW/H come from the viewBox w/h (1840, 1640)
  // and dots are placed as (x/100)*svgNatW, so we need coords
  // relative to the viewBox origin (460, 220)
  var relX = sx - SVG_X;
  var relY = sy - SVG_Y;
  return {
    x: +Math.max(0, Math.min(100, (relX / 1840) * 100)).toFixed(1),
    y: +Math.max(0, Math.min(100, (relY / 1640) * 100)).toFixed(1)
  };
}

function applyViewBox() {
  document.getElementById('floor-svg').setAttribute('viewBox', vx + ' ' + vy + ' ' + vw + ' ' + vh);
  drawGrid(+document.getElementById('density').value);
}

function resetView() {
  var c  = document.getElementById('map-wrap');
  var cw = c.clientWidth, ch = c.clientHeight;
  var pad = 40;
  // Fit the content region (the viewBox crop), not the whole 0→NAT_W space
  var cropW = 1840, cropH = 1640;
  var scaleX   = (cw - pad * 2) / cropW;
  var scaleY   = (ch - pad * 2) / cropH;
  var fitScale = Math.min(scaleX, scaleY);
  vw = cw / fitScale;
  vh = ch / fitScale;
  vx = SVG_X + (cropW - vw) / 2;
  vy = SVG_Y + (cropH - vh) / 2;
  applyViewBox();
}
function zoomBy(factor, px, py) {
  var c = document.getElementById('map-wrap');
  px = (px !== undefined) ? px : c.clientWidth  / 2;
  py = (py !== undefined) ? py : c.clientHeight / 2;
  var anchor = screenToSVG(px, py);
  var maxVw  = NAT_W * 3;
  var minVw  = NAT_W / 20;
  var newVw  = Math.max(minVw, Math.min(maxVw, vw / factor));
  var newVh  = newVw * (c.clientHeight / c.clientWidth);
  vx = anchor.x - (px / c.clientWidth)  * newVw;
  vy = anchor.y - (py / c.clientHeight) * newVh;
  vw = newVw;
  vh = newVh;
  applyViewBox();
}

// ── Load floor plan SVG inline ────────────────
fetch(FLOOR_SRC)
  .then(function(r) { return r.text(); })
  .then(function(text) {
    text = text.replace(/(<svg[^>]*?)\s+width=["'][^"']*["']/i,  '$1');
    text = text.replace(/(<svg[^>]*?)\s+height=["'][^"']*["']/i, '$1');
    var parser  = new DOMParser();
    var doc     = parser.parseFromString(text, 'image/svg+xml');
    var inlined = doc.documentElement;
    // Copy children into our floor-svg element
    var floorSvg = document.getElementById('floor-svg');
    while (inlined.firstChild) floorSvg.appendChild(inlined.firstChild);
    // Dim it slightly so grid/crosshairs are visible
    floorSvg.style.opacity = '0.65';
    resetView();
  })
  .catch(function() {
    // Fallback: just show as image element
    var floorSvg = document.getElementById('floor-svg');
    var imgEl = document.createElementNS('http://www.w3.org/2000/svg', 'image');
    imgEl.setAttribute('href',   FLOOR_SRC);
    imgEl.setAttribute('x',      '0');
    imgEl.setAttribute('y',      '0');
    imgEl.setAttribute('width',  NAT_W);
    imgEl.setAttribute('height', NAT_H);
    imgEl.style.opacity = '0.65';
    floorSvg.appendChild(imgEl);
    resetView();
  });

// ── Pan/zoom interactions ─────────────────────
var el = document.getElementById('map-wrap');

el.addEventListener('wheel', function(e) {
  e.preventDefault();
  var r = el.getBoundingClientRect();
  zoomBy(e.deltaY < 0 ? 1.12 : 0.89, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

el.addEventListener('mousedown', function(e) {
  if (e.target.closest('.zoom-btn')) return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragStartVx = vx; dragStartVy = vy;
  el.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var c  = document.getElementById('map-wrap');
  var dx = (e.clientX - dragStartX) / c.clientWidth  * vw;
  var dy = (e.clientY - dragStartY) / c.clientHeight * vh;
  vx = dragStartVx - dx;
  vy = dragStartVy - dy;
  applyViewBox();
});
window.addEventListener('mouseup', function() {
  if (!isDragging) return;
  isDragging = false;
  el.style.cursor = isHovering ? 'crosshair' : 'crosshair';
});

// ── Crosshairs + coordinates ──────────────────
var showGrid = true;
var cx = null, cy = null;
var clickHistory = [];

var xhH  = document.getElementById('xhair-h');
var xhV  = document.getElementById('xhair-v');
var dot  = document.getElementById('cursor-dot');
var lxEl = document.getElementById('lx');
var lyEl = document.getElementById('ly');

el.addEventListener('mousemove', function(e) {
  if (isDragging) return;
  var b  = el.getBoundingClientRect();
  var mx = e.clientX - b.left, my = e.clientY - b.top;
  var sv = screenToSVG(mx, my);
  var p  = svgToPct(sv.x, sv.y);
  lxEl.textContent = p.x;
  lyEl.textContent = p.y;
  xhH.style.display = 'block'; xhH.style.top  = my + 'px';
  xhV.style.display = 'block'; xhV.style.left = mx + 'px';
  dot.style.display = 'block'; dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  isHovering = true;
});

el.addEventListener('mouseleave', function() {
  xhH.style.display = xhV.style.display = dot.style.display = 'none';
  lxEl.textContent = lyEl.textContent = '—';
  isHovering = false;
});

el.addEventListener('click', function(e) {
  if (Math.abs(e.clientX - dragStartX) > 4 || Math.abs(e.clientY - dragStartY) > 4) return; // ignore drag-release
  var b  = el.getBoundingClientRect();
  var sv = screenToSVG(e.clientX - b.left, e.clientY - b.top);
  var p  = svgToPct(sv.x, sv.y);
  cx = p.x; cy = p.y;
  document.getElementById('click-box').innerHTML =
    '<span class="click-val">x: ' + cx + ', y: ' + cy + '</span>' +
    '<span class="click-hint">paste into FOUNTAINS array in map.html</span>';
  var btn = document.getElementById('copy-btn');
  btn.textContent = 'copy as x: ' + cx + ', y: ' + cy;
  btn.classList.remove('copied');
  clickHistory.unshift({ x: cx, y: cy });
  if (clickHistory.length > 20) clickHistory.pop();
  renderHistory();
});

function copyCoords() {
  if (cx === null) return;
  navigator.clipboard.writeText('x: ' + cx + ', y: ' + cy).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = '✓ copied!'; btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'copy as x: ' + cx + ', y: ' + cy;
      btn.classList.remove('copied');
    }, 1400);
  });
}

function renderHistory() {
  document.getElementById('history').innerHTML = clickHistory.map(function(h, i) {
    return '<div class="hist-item">' +
      '<span class="hist-xy">x:<span>' + h.x + '</span> y:<span>' + h.y + '</span></span>' +
      '<span class="hist-n">#' + (clickHistory.length - i) + '</span>' +
      '<button class="hist-cp" onclick="navigator.clipboard.writeText(\'x: ' + h.x + ', y: ' + h.y + '\')" title="copy">⎘</button>' +
      '</div>';
  }).join('');
}

// ── Grid overlay ──────────────────────────────
// Grid lines are drawn in screen pixel space on top of the zoomed floor plan.
// This keeps grid lines a constant visual weight regardless of zoom level.
function drawGrid(d) {
  var svg = document.getElementById('grid-svg');
  if (!showGrid) { svg.innerHTML = ''; return; }

  var c  = document.getElementById('map-wrap');
  var cw = c.clientWidth, ch = c.clientHeight;
  var html = '';

  // Draw vertical lines for each percentage step
  for (var p = 0; p <= 100; p += d) {
    // Convert SVG x coordinate to screen x
    var svgX  = (p / 100) * NAT_W;
    var scrX  = (svgX - vx) / vw * cw;
    if (scrX < 0 || scrX > cw) continue;
    var maj   = (p % (d * 5) === 0);
    html += '<line x1="' + scrX + '" y1="0" x2="' + scrX + '" y2="' + ch +
            '" stroke="rgba(37,99,235,' + (maj ? .22 : .08) + ')" stroke-width="' + (maj ? .8 : .4) + '"/>';
    if (maj || d >= 10) {
      html += '<text x="' + (scrX + 2) + '" y="14" font-size="9" fill="rgba(37,99,235,0.5)" font-family="DM Mono,monospace">' + p + '</text>';
    }
  }
  // Draw horizontal lines
  for (var p = 0; p <= 100; p += d) {
    var svgY  = (p / 100) * NAT_H;
    var scrY  = (svgY - vy) / vh * ch;
    if (scrY < 0 || scrY > ch) continue;
    var maj   = (p % (d * 5) === 0);
    html += '<line x1="0" y1="' + scrY + '" x2="' + cw + '" y2="' + scrY +
            '" stroke="rgba(37,99,235,' + (maj ? .22 : .08) + ')" stroke-width="' + (maj ? .8 : .4) + '"/>';
    if (maj || d >= 10) {
      html += '<text x="3" y="' + (scrY - 2) + '" font-size="9" fill="rgba(37,99,235,0.5)" font-family="DM Mono,monospace">' + p + '</text>';
    }
  }

  svg.innerHTML = html;
}

function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('grid-toggle').classList.toggle('on', showGrid);
  drawGrid(+document.getElementById('density').value);
}

function updateGrid() {
  var d = +document.getElementById('density').value;
  document.getElementById('dv').textContent = d;
  drawGrid(d);
}

window.addEventListener('resize', resetView);
</script>
</body>
</html>
